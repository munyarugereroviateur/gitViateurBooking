{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow-sm border-danger">
      <div class="card-body">
        <h3 class="card-title mb-4">Delete Flight</h3>
        <p>Are you sure you want to delete flight <strong>{{ flight.flight_number }}</strong> ({{ flight.origin }} &rarr; {{ flight.destination }})?</p>
        <form method="post">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger">Yes, Delete</button>
          <a href="{% url 'flight_list' %}" class="btn btn-secondary">Cancel</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
